name: Ping & Filter VPN Keys

on:
  schedule:
    - cron: "0 * * * *"       # Каждый час
  workflow_dispatch:           # Ручной запуск

jobs:
  ping-filter:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Ping and filter keys
        run: |
          python << 'EOF'
          import re
          import subprocess
          import os
          import time
          import shutil
          from datetime import datetime

          # === НАСТРОЙКИ ===
          SOURCE_FILE = "keys.txt"          # Исходный файл с ключами (создаётся 1 раз)
          WORK_FILE = "alive_keys.txt"      # Рабочий файл (обновляется каждый час)
          OUTPUT_DIR = "githubmirror"       # Папка для бэкапов
          PING_COUNT = 2
          TIMEOUT = 5

          # === ФУНКЦИИ ===
          def extract_ip(key):
              """Извлекает IP из ключа"""
              patterns = [
                  r'@([^:]+):',
                  r'://([^@]+)@([^:]+):',
                  r'trojan://[^@]+@([^:]+):',
                  r'(\d+\.\d+\.\d+\.\d+):'
              ]
              for pattern in patterns:
                  match = re.search(pattern, key)
                  if match:
                      return match.group(1) if len(match.groups()) == 1 else match.group(2)
              return None

          def ping_ip(ip):
              """Проверяет доступность IP через ping"""
              try:
                  result = subprocess.run(
                      ['ping', '-c', str(PING_COUNT), '-W', str(TIMEOUT), ip],
                      capture_output=True,
                      text=True,
                      timeout=TIMEOUT + 2
                  )
                  return result.returncode == 0
              except Exception:
                  return False

          def load_keys(filename):
              """Загружает ключи из файла"""
              try:
                  with open(filename, 'r', encoding='utf-8') as f:
                      return [line.strip() for line in f if line.strip()]
              except FileNotFoundError:
                  return None
              except Exception as e:
                  print(f"❌ Ошибка чтения {filename}: {e}")
                  return []

          def save_keys(keys, filename):
              """Сохраняет ключи в файл"""
              with open(filename, 'w', encoding='utf-8') as f:
                  f.write('\n'.join(keys))

          def backup_keys(keys):
              """Сохраняет бэкап с датой"""
              os.makedirs(OUTPUT_DIR, exist_ok=True)
              timestamp = datetime.now().strftime('%Y%m%d_%H%M')
              backup_file = f"{OUTPUT_DIR}/alive_{timestamp}.txt"
              save_keys(keys, backup_file)
              return backup_file

          # === ОСНОВНАЯ ЛОГИКА ===
          print("=========================================")
          print("📡 ФИЛЬТРАЦИЯ VPN-КЛЮЧЕЙ")
          print(f"⏰ {datetime.now().strftime('%d.%m.%Y %H:%M:%S')}")
          print("=========================================")
          print()

          # 1. Загружаем исходные ключи (ТОЛЬКО 1 РАЗ)
          if not os.path.exists(WORK_FILE):
              print(f"📂 Первый запуск! Загружаю ключи из {SOURCE_FILE}...")
              initial_keys = load_keys(SOURCE_FILE)
              if not initial_keys:
                  print(f"❌ Файл {SOURCE_FILE} не найден или пуст!")
                  print("📌 Создайте keys.txt в корне репозитория")
                  exit(1)
              print(f"✅ Загружено {len(initial_keys)} ключей")
              keys_to_check = initial_keys
              save_keys(keys_to_check, WORK_FILE)
              backup_keys(keys_to_check)
          else:
              print(f"📂 Загружаю рабочий файл {WORK_FILE}...")
              keys_to_check = load_keys(WORK_FILE)
              if not keys_to_check:
                  print("❌ Рабочий файл пуст!")
                  exit(1)
              print(f"✅ Загружено {len(keys_to_check)} ключей")

          print()

          # 2. Извлекаем уникальные IP
          print("🔍 Извлекаю IP-адреса...")
          ip_to_keys = {}
          for key in keys_to_check:
              ip = extract_ip(key)
              if ip:
                  if ip not in ip_to_keys:
                      ip_to_keys[ip] = []
                  ip_to_keys[ip].append(key)

          print(f"✅ Найдено {len(ip_to_keys)} уникальных IP")
          print()

          # 3. Пингуем каждый IP
          print("📡 Проверяю доступность IP...")
          alive_keys = []
          total = len(ip_to_keys)
          checked = 0

          for ip, key_list in ip_to_keys.items():
              checked += 1
              print(f"  ⏳ {checked}/{total}: {ip}", end=" ")

              if ping_ip(ip):
                  print("✅ ЖИВ")
                  alive_keys.extend(key_list)
              else:
                  print("❌ МЁРТВ")

              time.sleep(0.3)

          print()

          # 4. Сохраняем результаты
          print("💾 Сохраняю результаты...")
          save_keys(alive_keys, WORK_FILE)
          backup_keys(alive_keys)

          # 5. Статистика
          initial_count = len(keys_to_check)
          alive_count = len(alive_keys)
          dead_count = initial_count - alive_count
          survival_rate = (alive_count / initial_count * 100) if initial_count > 0 else 0

          print()
          print("=========================================")
          print("📊 СТАТИСТИКА ПРОВЕРКИ")
          print("=========================================")
          print(f"  📄 Было ключей:       {initial_count}")
          print(f"  ❌ Удалено:           {dead_count}")
          print(f"  ✅ Осталось живых:    {alive_count}")
          print(f"  📊 Процент выживаемости: {survival_rate:.1f}%")
          print("=========================================")
          print()

          # 6. Прогноз на неделю
          if initial_count > 0 and alive_count < initial_count:
              daily_death_rate = (initial_count - alive_count) / 7  # ~за 7 дней
              estimated_survivors = max(0, alive_count - daily_death_rate * 7)
              print(f"🔮 Прогноз на неделю: ~{int(estimated_survivors)} ключей останутся")
              print()

          # 7. Финальное сообщение
          if alive_count == 0:
              print("⚠️  ВСЕ КЛЮЧИ МЁРТВЫ!")
              print("📌 Добавьте новые ключи в keys.txt и запустите заново")
          else:
              print(f"✅ Живые ключи сохранены в {WORK_FILE}")
              print(f"📁 Бэкап сохранён в папку {OUTPUT_DIR}/")
              print()
              print("📋 Лучшие 10 ключей:")
              for i, key in enumerate(alive_keys[:10], 1):
                  ip = extract_ip(key) or "unknown"
                  print(f"  {i}. {ip}")

          print()
          print("=========================================")
          print("🔄 Следующая проверка через час")
          print("=========================================")
          EOF

      - name: Save results
        run: |
          echo "⏳ Сохраняю изменения..."
          git config --local user.name "github-actions[bot]"
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git add alive_keys.txt githubmirror/
          git diff --staged --quiet || git commit -m "🔄 Обновление ключей $(date '+%d.%m.%Y %H:%M') | Осталось: $(wc -l < alive_keys.txt) живых"
          git push
          echo "✅ Изменения сохранены"

      - name: Done
        run: |
          echo ""
          echo "========================================="
          echo "✅  ВСЕ ГОТОВО!"
          echo "========================================="
          echo ""
          echo "📁 Файлы:"
          echo "  📄 alive_keys.txt        — текущие живые ключи (обновляется каждый час)"
          echo "  📂 githubmirror/         — бэкапы с датой"
          echo ""
          echo "⏰ Следующая проверка через час"
          echo "========================================="
