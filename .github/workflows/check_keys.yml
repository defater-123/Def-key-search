name: Проверка VPN ключей

on:
  schedule:
    - cron: '5 * * * *'
  workflow_dispatch:

jobs:
  filter-keys:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: write
    
    steps:
      - name: Клонируем репозиторий
        uses: actions/checkout@v4
      
      - name: Устанавливаем зависимости
        run: |
          sudo apt-get update
          sudo apt-get install -y unzip wget
      
      - name: Делаем скрипт исполняемым
        run: chmod +x filter_keys.sh
      
      - name: Запускаем фильтрацию
        run: ./filter_keys.sh
      
      - name: Сохраняем результат
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add WorkKey.txt
          git diff --staged --quiet || git commit -m "🔄 Обновлен WorkKey.txt: $(wc -l < WorkKey.txt) живых"
          git push
